<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CampusCycle — Join the Movement</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #d3daf6;
    --surface: rgba(255, 255, 255, 0.7);
    --border: rgba(255, 255, 255, 0.4);
    --accent: #10b981;
    --accent-glow: rgba(16, 185, 129, 0.4);
    --text-main: #0f172a;
    --text-muted: #475569;
    --font-display: 'Outfit', sans-serif;
    --font-body: 'Inter', sans-serif;
  }

  /* ── DYNAMIC BACKGROUND ── */
  body {
    background-color: var(--bg);
    font-family: var(--font-body);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    overflow: hidden; /* Keeps blobs contained */
    position: relative;
  }

  .bg-blobs {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    z-index: -1;
    filter: blur(80px);
  }

  .blob {
    position: absolute;
    width: 400px;
    height: 400px;
    background: var(--accent);
    border-radius: 50%;
    opacity: 0.3;
    animation: move 20s infinite alternate;
  }

  .blob-1 { top: -100px; left: -100px; background: #6366f1; }
  .blob-2 { bottom: -100px; right: -100px; background: var(--accent); animation-delay: -5s; }
  .blob-3 { top: 50%; left: 50%; background: #3b82f6; width: 300px; height: 300px; animation-delay: -10s; }

  @keyframes move {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(100px, 50px) scale(1.2); }
  }

  /* ── AUTH CARD (Corrected Shape) ── */
  .auth-card {
    background: var(--surface);
    backdrop-filter: blur(25px) saturate(180%);
    -webkit-backdrop-filter: blur(25px) saturate(180%);
    border: 1px solid var(--border);
    /* Modern "Squircle" feel - large radius with slight asymmetry */
    border-radius: 40px; 
    padding: 50px;
    width: 100%;
    max-width: 480px;
    box-shadow: 
        0 20px 50px rgba(0,0,0,0.1),
        inset 0 0 20px rgba(255,255,255,0.3);
    position: relative;
    z-index: 10;
  }

  .logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 26px;
    text-decoration: none;
    color: var(--text-main);
    margin-bottom: 40px;
  }
  .logo span { color: var(--accent); }

  h2 {
    font-family: var(--font-display);
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 8px;
    text-align: center;
    letter-spacing: -0.5px;
  }

  p.subtitle {
    text-align: center;
    color: var(--text-muted);
    font-size: 15px;
    margin-bottom: 35px;
  }

  /* ── FORM STYLING ── */
  .form-group { margin-bottom: 22px; }

  label {
    display: block;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--text-main);
    padding-left: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  input {
    width: 100%;
    padding: 16px 20px;
    border-radius: 18px; /* Matching the card's curves */
    border: 1px solid rgba(0,0,0,0.08);
    background: rgba(255,255,255,0.6);
    font-family: var(--font-body);
    font-size: 15px;
    transition: all 0.3s ease;
  }

  input:focus {
    outline: none;
    border-color: var(--accent);
    background: #fff;
    box-shadow: 0 10px 20px rgba(16, 185, 129, 0.1);
    transform: translateY(-2px);
  }

  .btn-submit {
    width: 100%;
    background: var(--text-main); /* Dark theme for button to pop */
    color: white;
    padding: 18px;
    border: none;
    border-radius: 18px;
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    margin-top: 15px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
  }

  .btn-submit:hover {
    background: var(--accent);
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 15px 30px var(--accent-glow);
  }

  .toggle-text {
    text-align: center;
    margin-top: 25px;
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 500;
  }

  .toggle-text span {
    color: var(--accent);
    font-weight: 800;
    cursor: pointer;
    margin-left: 4px;
    transition: 0.2s;
  }
  .toggle-text span:hover { opacity: 0.8; }

  #signup-form { display: none; }

</style>
</head>
<body>

<div class="bg-blobs">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<div class="auth-card">
  <a href="#" class="logo">Campus<span>Cycle</span></a>
  
  <div id="login-form">
    <h2>Welcome Back</h2>
    <p class="subtitle">Enter your details to continue cycling</p>
    
    <form>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" placeholder="name@university.edu" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-submit">Sign In</button>
    </form>
    
    <p class="toggle-text">New here? <span onclick="toggleAuth()">Create an account</span></p>
  </div>

  <div id="signup-form">
    <h2>Join the Cycle</h2>
    <p class="subtitle">Complete your student profile</p>
    
    <form>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" placeholder="Alex Johnson" required>
      </div>
      <div class="form-group">
        <label>Roll No / ID</label>
        <input type="text" placeholder="2024CS101" required>
      </div>
      <div class="form-group">
        <label>College Name</label>
        <input type="text" placeholder="Imperial College" required>
      </div>
      <div class="form-group">
        <label>College Email</label>
        <input type="email" placeholder="alex@university.edu" required>
      </div>
      <button type="submit" class="btn-submit">Register Now</button>
    </form>
    
    <p class="toggle-text">Already a member? <span onclick="toggleAuth()">Log In</span></p>
  </div>
</div>

<script>
  function toggleAuth() {
    const login = document.getElementById('login-form');
    const signup = document.getElementById('signup-form');
    
    // Simple fade effect
    [login, signup].forEach(el => el.style.opacity = 0);
    
    setTimeout(() => {
      if (login.style.display === "none") {
        login.style.display = "block";
        signup.style.display = "none";
      } else {
        login.style.display = "none";
        signup.style.display = "block";
      }
      setTimeout(() => {
        login.style.opacity = 1;
        signup.style.opacity = 1;
      }, 50);
    }, 200);
  }
</script>

</body>
</html>
