<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusCycle — Join the Movement</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="auth-body">
  <canvas id="bg-canvas"></canvas>

  <div class="auth-card" id="tilt-card">
    <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 30px;">Campus<span>Cycle</span></a>

    <div id="login-form">
      <h2>Welcome Back</h2>
      <p class="subtitle">Log in to your student account</p>
      <form onsubmit="loginUser(event)">
        <div class="form-group">
          <label>Email ID</label>
          <input type="email" id="loginEmail" placeholder="name@gmail.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-submit" style="width:100%; border:none; cursor:pointer;">Log In</button>
      </form>
      <p class="toggle-text">Don't have an account? <span onclick="toggleAuth()"
          style="cursor:pointer; color:var(--accent);">Create one</span></p>
    </div>

    <div id="signup-form" style="display:none;">
      <h2>Join the Cycle</h2>
      <p class="subtitle">Complete your student profile</p>
      <form onsubmit="signupUser(event)">
        <div class="form-group"><label>Full Name</label><input type="text" id="name" placeholder="Your Name" required>
        </div>
        <div class="form-group"><label>Roll No / ID</label><input type="text" id="roll" placeholder="e.g. 2024CS101"
            required></div>
        <div class="form-group"><label>Email ID</label><input type="email" id="email" placeholder="abc@university.edu"
            required></div>
        <div class="form-group"><label>Password</label><input type="password" id="password" placeholder="••••••••"
            required></div>
        <button type="submit" class="btn-submit" style="width:100%; border:none; cursor:pointer;">Register now</button>
      </form>
      <p class="toggle-text">Already a member? <span onclick="toggleAuth()"
          style="cursor:pointer; color:var(--accent);">Log In</span></p>
    </div>
  </div>

  <script>
    const API = "http://localhost:5000";

    // LOGIN FUNCTION
    async function loginUser(event) {
      event.preventDefault();

      const email = document.getElementById("loginEmail").value;
      const password = document.getElementById("loginPassword").value;

      try {
        const response = await fetch(`${API}/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const result = await response.text();

        if (response.ok) {
          alert("Success: " + result);
          window.location.href = "index.html"; // Redirect only if backend confirms
        } else {
          alert("Error: " + result);
        }
      } catch (err) {
        alert("Server is not running!");
      }
    }

    // SIGNUP FUNCTION
    async function signupUser(event) {
      event.preventDefault();

      const data = {
        name: document.getElementById("name").value,
        roll: document.getElementById("roll").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
      };

      try {
        const response = await fetch(`${API}/signup`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });

        const result = await response.text();
        alert(result);

        if (response.ok) {
          toggleAuth(); // Switch to login form after successful signup
        }
      } catch (err) {
        alert("Server is not running!");
      }
    }

    function toggleAuth() {
      const login = document.getElementById('login-form');
      const signup = document.getElementById('signup-form');
      if (login.style.display === "none") {
        login.style.display = "block";
        signup.style.display = "none";
      } else {
        login.style.display = "none";
        signup.style.display = "block";
      }
    }

    /* Your Particle Code stays exactly the same here... */
  </script>
</body>

</html>
