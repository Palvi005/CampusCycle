<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Listings — CampusCycle</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Outfit:wght@800&display=swap" rel="stylesheet">
</head>
<body>
</head>
<body>

    <div class="dashboard-container">
        
        <header class="header-flex">
            <div>
                <h1>Success! <br>Your item is <span style="color:#10b981">Live.</span></h1>
                <p style="color:#64748b; margin-top: 10px;">Students on campus are now viewing your listings.</p>
            </div>
            <a href="seller.html" class="list-new-btn">+ List New Item</a>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <span>Active Ads</span>
                <h2>01</h2>
            </div>
            <div class="stat-card">
                <span>Chat Requests</span>
                <h2>00</h2>
            </div>
            <div class="stat-card" style="background: #10b981; color: white;">
                <span style="color: rgba(255,255,255,0.7)">Trust Score</span>
                <h2>98%</h2>
            </div>
        </div>

        <div class="inventory-section">
            <h3 style="font-family:'Outfit';">Current Inventory</h3>
            
            <div class="inventory-grid">
                
                <div class="item-card">
                    <div class="badge-live">
                        <div class="pulse-dot"></div> LIVE NOW
                    </div>
                    
                    <div class="item-thumb">
                        <span>📦</span>
                    </div>

                    <h4 style="margin:0; font-family:'Outfit'; font-size: 20px;">Recent Listing</h4>
                    <p style="color:#94a3b8; font-size: 13px; margin: 5px 0;">Matching with potential buyers...</p>
                    
                    <div class="price-tag" style="font-size: 22px; font-weight: 800; color: #10b981; margin: 15px 0;">₹ Pending</div>

                    <div class="card-actions" style="display: flex; gap: 10px;">
                        <button class="action-btn">Edit Post</button>
                        <button class="action-btn">Mark Sold</button>
                        <button class="action-btn" style="color:#ef4444;">Remove</button>
                    </div>
                </div>

                <div class="security-placeholder" style="border: 2px dashed #e2e8f0; border-radius: 30px; display:flex; align-items:center; justify-content:center; flex-direction:column; color:#cbd5e1; padding: 40px;">
                    <span style="font-size: 40px; margin-bottom: 10px;">🛡️</span>
                    <p style="font-weight: 700; font-size: 14px; margin: 0; color:#94a3b8;">Buyer Safety Enabled</p>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
